name: Tests

on:
  push:
    branches:
      - master
      - main


      - 'release/**'
  pull_request:
    branches:
      - master
      - main




permissions:
  contents: read
  pull-requests: write


jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Lint with ruff
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Check metadata sync
        run: bash .claude/scripts/validate-metadata-sync.sh

      - name: Run tests with coverage
        run: make coverage

      - name: Upload base coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: base-coverage
          path: coverage.json
          retention-days: 30
          overwrite: true

      - name: Download base coverage
        if: github.event_name == 'pull_request'
        id: base-cov
        uses: actions/download-artifact@v8
        with:
          name: base-coverage
          path: /tmp/base-coverage
        continue-on-error: true

      - name: Post coverage delta comment
        if: github.event_name == 'pull_request' && steps.base-cov.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .claude/scripts/pr-comment-coverage.sh \
            /tmp/base-coverage/coverage.json \
            coverage.json \
            ${{ github.event.pull_request.number }}



      - name: Risk assessment (deterministic checks)
        if: github.event_name == 'pull_request'
        run: bash .claude/scripts/check-risk-assessment.sh

      - name: Check TQS gate
        run: bash .claude/scripts/check-tqs.sh




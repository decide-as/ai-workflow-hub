name: Tag CI

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          META_VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('project-meta.yaml'))['version'])")
          if [ "$TAG_VERSION" != "$META_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match project-meta.yaml version $META_VERSION"
            exit 1
          fi
          echo "[ok] Tag v$TAG_VERSION matches project-meta.yaml version $META_VERSION"

# Risk Applicability Registry
#
# Maps every risk ID to its minimum tier and (optionally) constrains which
# projects it applies to.  The filter module uses this file together with
# project-meta.yaml to produce a reduced checklist for each PR.
#
# Structure
# ---------
# tiers:        Maps tier numbers (and "ai") to lists of risk IDs.
#               Tier N includes all lower tiers.  "ai" risks are always
#               enforced regardless of tier.
#
# applicability: Per-risk overrides.  Only risks with NARROW applicability
#               need an entry here.  Risks not listed apply to ALL projects.
#
#   Dimensions (all optional — omitted = applies to all):
#     languages:  [python] | [node] | [python, node]
#     categories: subset of [agent, tool, library, data, service,
#                 generator, processor, utility]
#     requires:   capability flags from project-meta.yaml
#                 (has_api_keys, has_a2a, docker_image, etc.)
#
# Decision principle for new entries
# -----------------------------------
# Add an applicability entry when a risk is STRUCTURALLY inapplicable
# to a project type — not when it is merely unlikely.
#
#   - "Requires HTTP endpoints" → restrict to [service, agent].
#   - "Requires a running process" → restrict to [service, agent].
#   - "Requires Python runtime" → restrict to languages: [python].
#   - "Requires native memory management" → languages: [native].
#   - "Relevant to any code" → leave universal (no entry needed).
#
# When in doubt, leave the risk universal.  The semantic evaluator can
# still mark it N/A with a reason — but the filter should not silently
# hide risks that could plausibly apply.
#
# Canonical risk definitions live in:
#   docs/risk/risk-matrix.md       — phase-graduated general risks
#   docs/risk/ai-risk-controls.md  — AI-specific risks (always enforced)


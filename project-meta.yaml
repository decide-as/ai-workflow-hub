# Identity
name: workflow-hub
display_name: Workflow Hub
version: 0.19.2
description: >
  Desktop Electron app for managing and launching AI workflow sessions.
  Displays registered workflows as clickable cards grouped by auto-detected
  workspace clusters, with a CLI for registration.
summary: Desktop app for managing and launching AI workflow sessions
author:
  name: Christian Braathen
  github: decide-as
license: All Rights Reserved
repository: https://github.com/decide-as/workflow-hub

# Classification
visibility: personal
category: tool
archetype: node-tool
tags: [electron, desktop, ai, workflows, productivity]
domain: productivity

# Technical
language: node
language_version: ">=20"
runtime: node
ai_providers: [none]
entry_point: src/main/index.ts
install_command: npm install
run_command: npm run dev
test_command: npm test

# Framework options

# Capabilities
has_api_keys: false
has_cron: false
has_cli: true
has_tests: true
has_lib: false
has_ui: true
has_database: false

# Distribution
pypi_package: false
docker_image: false
registry_status: draft

# Maturity
stage: build
phase: mvp

# Permissions
allow_git_push: false
allow_auto_merge: false

# Quality
quality_gate: basic
coverage_target: 60
world_class: true
project_criticality: standard
branching_complexity: simple
scoring_profile: solo_dev

# Template provenance
template_name: node-tool
template_version: "10cb18bd7ba2"

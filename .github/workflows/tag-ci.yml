name: Tag CI

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          npx eslint .
          npx prettier --check .

      - name: Run tests
        run: npm test

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          META_VERSION=$(grep '^version:' project-meta.yaml | head -1 | awk '{print $2}' | tr -d '"')
          if [ "$TAG_VERSION" != "$META_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match project-meta.yaml version $META_VERSION"
            exit 1
          fi
          echo "[ok] Tag v$TAG_VERSION matches project-meta.yaml version $META_VERSION"

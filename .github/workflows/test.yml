name: Tests

on:
  push:
    branches:
      - master
      - main


      - 'release/**'
  pull_request:
    branches:
      - master
      - main




permissions:
  contents: read
  pull-requests: write


jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          npx eslint .
          npx prettier --check .

      - name: Check metadata sync
        run: bash .claude/scripts/validate-metadata-sync.sh

      - name: Run tests
        run: npm test




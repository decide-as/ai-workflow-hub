    run_count: 29
    success_rate: 1.0
    estimated_duration_seconds: 55
    estimated_cost_usd: 0.07
    model: claude-sonnet-4-6
    version: '2.1'
    complexity: moderate
    owner: Legal — legal@decide.as
    inputs:
      - name: counterparty_name
        type: string
        description: Full legal name of the other party
        required: true
        example: Acme Technologies AS
      - name: purpose
        type: string
        description: Business purpose the NDA covers

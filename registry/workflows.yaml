workflows:
  # ── Finance ────────────────────────────────────────────────────────────────
  - id: a1b2c3d4-0001-0000-0000-000000000001
    name: Travel Expense Report
    description: >
      Processes travel receipts uploaded as images or PDFs, extracts line items
      via OCR, maps them to your chart of accounts, and generates a formatted
      expense report ready for finance approval — including a policy-compliance
      check against your company's travel policy document.
    tags: [finance, expense, travel]
    repo_path: /Users/decide/git/ai-workflow-hub/workflows/travel-expense-report
    color: '#10b981'
    icon: Receipt
    cluster_id: a1b2c3d4-0001-0000-0000-000000000003
    added: '2026-01-10'
    updated: '2026-04-22'
    status: active
    trigger_type: manual
    schedule: null
    last_run_at: '2026-06-13T09:14:00Z'
    last_run_status: success
    run_count: 87
    success_rate: 0.97
    estimated_duration_seconds: 38
    estimated_cost_usd: 0.04
    model: claude-sonnet-4-6
    version: '3.1'
    complexity: moderate
    owner: Finance Ops — financeops@decide.as
    inputs:
      - name: receipts
        type: file
        description: PDF or image files of receipts (up to 20)
        required: true
        example: hotel_oslo_june.pdf
      - name: trip_purpose
        type: string
        description: Brief description of the business trip
        required: true
        example: Client workshop — Oslo, June 2026
      - name: cost_centre
        type: string
        description: Internal cost centre code
        required: false
        example: CC-4412
    outputs:
      - name: expense_report_pdf
        type: pdf
        description: Formatted expense report with itemised table and totals
      - name: flagged_items
        type: json
        description: Line items that breached policy thresholds

  - id: a1b2c3d4-0001-0000-0000-000000000002
    name: Budget Variance Analyst
    description: >
      Ingests actuals from your ERP export (CSV or XLSX) and compares them
      against the approved budget per cost centre. Generates a management-ready
      variance commentary with root-cause hypotheses and recommended actions,
      formatted for the monthly board pack.
    tags: [finance, budget, analysis]
    repo_path: /Users/decide/git/ai-workflow-hub/workflows/budget-variance-analyst
    color: '#10b981'
    icon: BarChart2
    cluster_id: a1b2c3d4-0001-0000-0000-000000000003
    added: '2026-01-15'
    updated: '2026-05-30'
    status: active
    trigger_type: scheduled
    schedule: 'Monthly — 1st of each month at 06:00'
    last_run_at: '2026-06-01T06:02:17Z'
    last_run_status: success
    run_count: 12
    success_rate: 1.0
    estimated_duration_seconds: 95
    estimated_cost_usd: 0.11
    model: claude-opus-4-8
    version: '1.4'
    complexity: complex
    owner: CFO Office — cfo@decide.as
    inputs:
      - name: actuals_file
        type: file
        description: ERP export with actuals (CSV or XLSX)
        required: true
        example: actuals_may_2026.csv
      - name: budget_file
        type: file
        description: Approved budget file matching the actuals period
        required: true
        example: budget_fy2026.xlsx
      - name: materiality_threshold_pct
        type: number
        description: Minimum variance % to include in commentary
        required: false
        example: '5'
    outputs:
      - name: variance_report_pdf
        type: pdf
        description: Board-ready variance commentary with tables
      - name: variance_data
        type: json
        description: Structured variance by cost centre (for downstream use)

  - id: a1b2c3d4-0001-0000-0000-000000000003
    name: Invoice Generator
    description: >
      Takes a project summary (hours, deliverables, agreed rates) and client
      master data, then drafts a professional invoice in your brand template.
      Handles multi-currency, VAT/GST calculation by jurisdiction, and
      populates payment terms from the signed contract on file.
    tags: [finance, invoicing, billing]
    repo_path: /Users/decide/git/ai-workflow-hub/workflows/invoice-generator
    color: '#10b981'
    icon: FileText
    cluster_id: a1b2c3d4-0001-0000-0000-000000000003
    added: '2026-02-01'
    updated: '2026-06-10'
    status: active
    trigger_type: manual
    schedule: null
    last_run_at: '2026-06-12T14:55:00Z'
    last_run_status: success
    run_count: 34
    success_rate: 1.0
    estimated_duration_seconds: 22
    estimated_cost_usd: 0.03
    model: claude-haiku-4-5
    version: '2.0'
    complexity: simple
    owner: Finance Ops — financeops@decide.as
    inputs:
      - name: project_summary
        type: string
        description: Free-text summary of work completed and hours
        required: true
        example: Strategy workshop facilitation — 3 days, 2 consultants
      - name: client_id
        type: string
        description: Client identifier for master data lookup
        required: true
        example: CLT-0042
      - name: currency
        type: string
        description: Invoice currency code
        required: false
        example: EUR
    outputs:
      - name: invoice_pdf
        type: pdf
        description: Branded invoice ready to send
      - name: invoice_json
        type: json
        description: Structured invoice data for accounting system import


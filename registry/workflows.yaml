# Workflow registry
# Populated as workflows are added via the CLI (`ai-hub add`) or the desktop app.
workflows:
  - id: 1e66a6fe-42f3-40fc-b831-a0bea33de71f
    name: Travel Reimbursement
    summary: Trip receipts → a Norwegian travel expense report.
    description: >
      Register a trip, drop your receipts into it, and produce a Norwegian-format
      travel expense report (Excel) plus a bookkeeping summary. Opens a Claude
      session that extracts, classifies, and totals the receipts.
    tags: [finance, expense, travel, reimbursement]
    repo_path: workflows/travel-reimbursement-form
    color: "#0ea5e9"
    icon: Plane
    cluster_id: finance
    added: "2026-06-16"
    updated: "2026-06-16"
    status: active
    trigger_type: manual
    complexity: moderate
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    inputs:
      - name: receipts
        type: file
        description: Receipt images/PDFs — bank-app screenshots or paper receipts
        required: true
        example: "06.png, 29.pdf"
      - name: trip_name
        type: string
        description: A name for the trip (becomes its data folder)
        required: true
        example: London May 2026
    outputs:
      - name: expense_report
        type: file
        description: >
          Filled Travel Expense Report (.xlsx) with bookkeeping summary, plus the
          receipts renamed to their 0# attachment numbers.
  - id: 7bc57d10-d082-4905-8aa6-535744725c82
    name: Expense Reimbursement
    summary: Business receipts → a reimbursement form with VAT.
    description: >
      Drop your business-expense receipts into a batch and produce a reimbursement
      form (Excel) plus a bookkeeping summary. Opens a Claude session that extracts,
      classifies, and totals the receipts with VAT.
    tags: [finance, expense, reimbursement, accounting]
    repo_path: workflows/expense-reimbursement-form
    color: "#10b981"
    icon: Receipt
    cluster_id: finance
    added: "2026-06-16"
    updated: "2026-06-16"
    status: active
    trigger_type: manual
    complexity: moderate
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    inputs:
      - name: receipts
        type: file
        description: Receipt images/PDFs — bank-app screenshots or paper receipts
        required: true
        example: "06.png, 29.pdf"
      - name: batch_name
        type: string
        description: A name for the expense batch (becomes its data folder)
        required: true
        example: Office supplies Q2 2026
    outputs:
      - name: expense_report
        type: file
        description: >
          Filled Expense Reimbursement form (.xlsx) with bookkeeping summary, plus
          the receipts renamed to their 0# attachment numbers.
  - id: db3104eb-04ac-47b1-87d6-6e369b7724f3
    name: Bank Transaction Triage
    summary: Bank exports → triaged, deduped, routed to forms.
    description: >
      Upload many bank exports (PDF statements, CSV/XLSX) from several accounts.
      Opens a Claude session that normalizes every line, lets you mark each
      register / maybe / skip, keeps a hash-keyed master ledger so re-imported
      statements never double-count, and routes reimbursable items into the
      Expense and Travel Reimbursement forms.
    tags: [finance, accounting, bank, reconciliation, bookkeeping]
    repo_path: workflows/bank-transaction-triage
    color: "#f59e0b"
    icon: ListOrdered
    cluster_id: finance
    added: "2026-06-16"
    updated: "2026-06-16"
    status: active
    trigger_type: manual
    complexity: moderate
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    inputs:
      - name: bank_exports
        type: file
        description: Bank statements / transaction exports (PDF, CSV, XLSX) from one or more accounts
        required: true
        example: "dnb-mai-2026.pdf, sparebank1-q2.csv"
      - name: batch_name
        type: string
        description: A name for the triage batch (becomes its data folder)
        required: true
        example: Q2 2026 reconciliation
    outputs:
      - name: triaged_ledger
        type: json
        description: >
          The hash-keyed master ledger of every dispositioned transaction, plus
          routed batches handed to the Expense/Travel Reimbursement generators.
  - id: 145bb544-5270-4288-9afd-1284a7edcce7
    name: Voice Transcriber
    summary: Record speech → text, auto-copied to clipboard.
    description: >
      Record your voice and transcribe it to text using OpenAI Whisper. Hit Record, speak,
      hit Stop — the transcription is sent to your clipboard automatically. Tap the card
      to see the full log of recent transcriptions (stored for 24 hours).
      Requires OPENAI_API_KEY to be set in your environment.
    tags: [voice, transcription, stt, utility]
    repo_path: "."
    color: "#ec4899"
    icon: Mic
    cluster_id: utilities
    added: "2026-06-17"
    updated: "2026-06-17"
    status: active
    trigger_type: manual
    complexity: simple
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    action: transcribe
    model: gpt-4o-transcribe
    outputs:
      - name: transcription
        type: text
        description: Transcribed text, auto-copied to clipboard and stored in the 24-hour log.
  - id: c339825f-f476-4a4d-a96c-8a4aa989fe36
    name: File Organizer
    summary: Tidy a messy folder into category subfolders.
    description: >
      Pick a folder (e.g. Downloads) and sort its top-level files into category
      subfolders by file type — Images, PDF, Spreadsheets, and more — inside an
      __ORGANIZED__ subfolder. Runs a dry-run preview first so you see every
      move before anything happens; content duplicates are set aside, empty
      folders removed, and an undo report written. Runs locally — no Claude
      session.
    tags: [files, organization, utility]
    repo_path: workflows/file-organizer
    color: "#8b5cf6"
    icon: FolderTree
    cluster_id: utilities
    added: "2026-06-17"
    updated: "2026-06-17"
    status: active
    trigger_type: scheduled
    schedule: Every hour · ~/Downloads
    complexity: simple
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    action: run
    runner:
      script: scripts/organize.py
      interpreter: python3
      pick_prompt: Choose a folder to organize
      preview: true
      apply_flag: "--execute"
      options:
        - key: min_age_days
          label: Only move files older than
          flag: "--min-age-days"
          type: number
          default: 7
          unit: days
          min: 0
          optional: true
    scheduled_job:
      label: as.decide.workflow-hub.file-organizer
      target: ~/Downloads
      cadence: Every hour
      interval_seconds: 3600
      min_age_days: 7
    inputs:
      - name: folder
        type: file
        description: The folder to organize (its top-level files get sorted)
        required: true
        example: ~/Downloads
    outputs:
      - name: organized_folder
        type: file
        description: >
          An __ORGANIZED__ subfolder with files sorted into category folders,
          duplicates set aside, plus a JSON report of every move for undo.
  - id: 115a3614-d1fe-460a-a6cb-54676775749b
    name: LinkedIn Posts
    summary: Ideate, draft, score, and schedule LinkedIn posts.
    description: >
      A content management system for LinkedIn thought-leadership publishing.
      Opens a Claude session in the standalone linkedin_posts repo that tracks
      the full lifecycle — idea capture, drafting against post-type templates,
      quality scoring (5 weighted criteria, publish at ≥75), weekly scheduling,
      and post-publish analytics — backed by a SQLite store.
    tags: [content, linkedin, writing, marketing]
    repo_path: /Users/christianbraathen/Repositories/linkedin_posts
    color: "#0a66c2"
    icon: PenLine
    cluster_id: content
    added: "2026-06-17"
    updated: "2026-06-17"
    status: active
    trigger_type: manual
    complexity: complex
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    inputs:
      - name: idea_or_url
        type: string
        description: A post idea, topic, or a source URL (Instagram/LinkedIn/YouTube/web) to research
        required: false
        example: "Why agentic AI is a strategic decision, not a technical one"
    outputs:
      - name: post_folder
        type: file
        description: >
          A numbered per-post folder (idea, draft versions, final text, scores,
          metadata, analytics) plus updates to the SQLite content database.
  - id: a4f82c3e-7b19-4d05-9e61-1c3f85de2047
    name: Scaffold New Project
    summary: Describe a project → Claude scaffolds it via code_practices.
    description: >
      Describe what you want to build in plain language. The hub clones the
      code_practices repo, checks out the branch you select, and opens a Claude
      session pre-seeded with your description. Claude generates an answers.yaml
      from your description and runs `cp create --from-answers answers.yaml` to
      scaffold a complete project — directory structure, config, CI, tests, rules,
      and all.
    tags: [scaffold, code_practices, project, setup, developer-tools]
    repo_path: /Users/christianbraathen/Repositories/code_practices
    color: '#8b5cf6'
    icon: Wand2
    cluster_id: developer-tools
    added: '2026-06-17'
    updated: '2026-06-17'
    status: active
    trigger_type: manual
    complexity: moderate
    version: '0.1.0'
    owner: Christian Braathen — christian@decide.as
    action: scaffold
    scaffold:
      repo: /Users/christianbraathen/Repositories/code_practices
      branch_default: master
      command: cp create --from-answers answers.yaml
      initial_prompt_template: |
        I want to scaffold a new project. Here is what I am building:

        {description}

        Please do the following:
        1. Create an `answers.yaml` file in the current directory that captures
           what I described above. The file should look like the example below —
           only include the fields a human would answer interactively; all derived
           fields are computed automatically by `cp create --from-answers`.

           Example answers.yaml:
             name: my-app
             description: A brief description of what the project does.
             archetype: python-fastapi
             has_api_keys: true
             quality_gate: basic
             branching_complexity: simple
             scoring_profile: solo_dev

           Common archetypes: python-fastapi, python-django, python-cli, python-lib,
           node-tool, node-api. Pick the one that best fits my description.

        2. Once the file is written, run: cp create --from-answers answers.yaml

        Start by writing the answers.yaml, show it to me for a quick review, and
        then run the command.

  - id: f3a91c2d-8e47-4b05-bc12-7d6f0e3a9c84
    name: Calendar Event Creator
    summary: Text, voice, or screenshot → Apple Calendar events via AppleScript.
    description: >
      Describe an event in plain text, record it with your voice, or paste a
      transit/flight screenshot. Claude generates the correct AppleScript for
      Apple Calendar (programmatic date building, Oslo timezone, emoji titles,
      alarms, walking legs in descriptions) and runs it directly — no copy-paste
      needed.
    tags: [calendar, productivity, applescript, transit, oslo]
    repo_path: .
    color: "#34d399"
    icon: CalendarDays
    cluster_id: utilities
    added: "2026-06-17"
    updated: "2026-06-17"
    status: active
    trigger_type: manual
    complexity: simple
    version: "0.1.0"
    owner: Christian Braathen — christian@decide.as
    action: calendar


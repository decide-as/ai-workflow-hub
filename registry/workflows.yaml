      (inferred from previous correspondence provided as context) and
      ensures consistent use of the client's preferred terminology.
      Flags anything that should be legal-reviewed before sending.
    tags: [communication, email, client]
    repo_path: /Users/decide/git/ai-workflow-hub/workflows/client-email-drafter
    color: '#f59e0b'
    icon: Mail
    cluster_id: c3d4e5f6-0003-0000-0000-000000000003

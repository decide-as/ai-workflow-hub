  - id: b2c3d4e5-0002-0000-0000-000000000001
    name: Contract Reviewer
    description: >
      Analyses vendor and client contracts for red flags, unfavourable
      clauses, and gaps against your standard legal template. Produces a
      structured risk summary with severity ratings, plain-English
      explanations, and suggested redlines — prioritised so your lawyer
      can focus on what matters.
    tags: [legal, contracts, compliance]
    repo_path: /Users/decide/git/ai-workflow-hub/workflows/contract-reviewer
    color: '#8b5cf6'
    icon: Shield
    cluster_id: b2c3d4e5-0002-0000-0000-000000000003
    added: '2026-01-20'
    updated: '2026-05-15'
    status: active
    trigger_type: manual
    schedule: null
    last_run_at: '2026-06-11T16:30:00Z'
    last_run_status: success
    run_count: 61
    success_rate: 0.93
    estimated_duration_seconds: 120
    estimated_cost_usd: 0.18
    model: claude-opus-4-8
    version: '4.2'
    complexity: complex
    owner: Legal — legal@decide.as
    inputs:
      - name: contract_file
        type: file
        description: Contract document (PDF or DOCX)
        required: true
        example: vendor_agreement_acme.pdf
      - name: contract_type
        type: string
        description: Type of contract for context-specific analysis
        required: true
        example: SaaS subscription / NDA / MSA
      - name: counterparty_jurisdiction
        type: string
        description: Governing law jurisdiction of the counterparty
        required: false
